id: b0ba07bd-d9ac-46df-9f5f-5d2156176774
prompt: |
  Hey, the security team just pinged us about a permissions issue in GlitchTip. Apparently
  during their quarterly access review they found that a bunch of engineers have owner-level
  access to everything — they can delete projects, mess with alert rules, revoke DSN keys, etc.
  Only the platform-eng folks (alice and bob) should have that level of access.

  We use Keycloak SSO for GlitchTip auth so something's off with how the OIDC integration
  is mapping roles. Also SSO login seems completely broken right now — someone mentioned they
  couldn't even reach Keycloak from GlitchTip when they tried to test.

  charlie, diana, and eve are the ones who definitely shouldn't be owners. They need to be
  regular members — both on the Keycloak side (group memberships) and in GlitchTip itself
  (the org member roles in the database).

  Can you look into what's going on with the whole SSO pipeline between GlitchTip
  (glitchtip.devops.local) and Keycloak (keycloak.devops.local) and get it sorted out?
  There are some internal docs floating around in ConfigMaps from when we did the Keycloak
  migration last year but idk how accurate they still are — take them with a grain of salt.

  The Keycloak admin creds should be on passwords.devops.local like everything else.

