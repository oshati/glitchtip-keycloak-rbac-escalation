id: b0ba07bd-d9ac-46df-9f5f-5d2156176774
prompt: |
  Hey, the security team just escalated a GlitchTip access-control problem during their
  quarterly review. A few engineers can currently perform actions that should be limited
  to the platform-eng owners. alice and bob are the only people who should retain that
  level of access.

  The accounts we care about most are charlie, diana, and eve. They should still be able
  to sign in and work normally, but they should not be able to manage organization-level
  resources or other owner-only settings.

  We use Keycloak SSO for GlitchTip and there was a migration to the newer auth layout a
  while back. Since then, the access model has felt inconsistent and recent validation
  checks have been noisy. Please trace the active auth path between GlitchTip
  (glitchtip.devops.local) and Keycloak (keycloak.devops.local), figure out what is still
  enforcing the bad state, and restore the intended owner/member split.

  There are a few internal migration artifacts and diagnostics in-cluster, but some of them
  are incomplete or stale. Treat them as clues, not ground truth.

  The Keycloak admin creds should be on passwords.devops.local like everything else.

metadata:
  category: platform-eng
  spec_id: 9e4d158e-96ff-4435-ab39-4d1e389f4b47
